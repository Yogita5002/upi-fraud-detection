server.port=8080

# PostgreSQL — connects to the Docker container defined in docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5432/frauddb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=fraud_user
spring.datasource.password=fraud_pass

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging
logging.level.com.frauddetection=INFO
